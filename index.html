<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice by @Darfdits</title>
    
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --text-sec: #8e8e93;
            --primary: #0a84ff;
            --success: #32d74b;
            --border: #3a3a3c;
            --input: #2c2c2e;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }

        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            box-sizing: border-box; margin-top: 20px;
        }

        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin: 0 0 20px 0; font-weight: 800; }
        
        .control-group { margin-bottom: 20px; }
        label { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-sec); margin-bottom: 8px; }
        label span { color: var(--primary); font-weight: bold; }

        input[type="range"] {
            width: 100%; height: 6px; background: var(--border);
            border-radius: 5px; appearance: none; outline: none; margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 22px; height: 22px; 
            background: #fff; border-radius: 50%; cursor: pointer;
        }

        input[type="file"], select, input[type="number"] {
            width: 100%; padding: 12px; background: var(--input);
            border: 1px solid var(--border); border-radius: 12px; color: var(--text);
            box-sizing: border-box; font-size: 1rem; outline: none;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button#btn {
            width: 100%; padding: 18px; background: var(--primary);
            border: none; border-radius: 12px; color: white;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            margin-top: 10px; transition: 0.2s;
        }
        button#btn:active { transform: scale(0.98); }
        button#btn:disabled { background: var(--border); color: var(--text-sec); cursor: not-allowed; }

        #status { text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--success); min-height: 1.5em; font-weight: bold; }
        progress { width: 100%; height: 8px; margin-top: 10px; accent-color: var(--primary); display: none; }
        video { width: 100%; margin-top: 20px; border-radius: 15px; display: none; background: #000; }

        .requirements {
            margin-top: 20px; padding: 20px; background: var(--card);
            border-radius: 20px; width: 100%; max-width: 420px;
            font-size: 0.75rem; color: var(--text-sec); line-height: 1.6;
            box-sizing: border-box;
        }
        .requirements h2 { font-size: 0.9rem; color: var(--text); margin: 0 0 10px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .requirements b { color: var(--text); }
        .footer-note { text-align: center; font-size: 0.7rem; color: var(--text-sec); margin: 20px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TimeSlice by @Darfdits</h1>
        
        <div class="control-group">
            <label>1. Select Video Source</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div class="control-group">
            <label>Number of Slices: <span id="val-slices">12</span></label>
            <input type="range" id="slices" min="2" max="40" value="12">
        </div>

        <div class="grid">
            <div class="control-group">
                <label>Delay (sec)</label>
                <input type="number" id="delay" value="0.10" step="0.05">
            </div>
            <div class="control-group">
                <label>Angle</label>
                <select id="mode">
                    <option value="vertical">Vertical</option>
                    <option value="horizontal">Horizontal</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <label>Time Flow</label>
            <select id="flow">
                <option value="normal">Normal</option>
                <option value="inverted">Inverted</option>
            </select>
        </div>

        <button id="btn">START RENDERING</button>
        
        <div id="status">Ready</div>
        <progress id="progress" value="0" max="100"></progress>
        
        <video id="outputVideo" controls playsinline></video>
    </div>

    <div class="requirements">
        <h2>System Requirements</h2>
        <b>iOS 15.0+:</b> Safari/Chrome (iPhone 8 or newer).<br>
        <b>Android 9.0+:</b> Google Chrome (4GB+ RAM recommended).<br>
        <b>Quick Tip:</b> Use 3-8s videos. Avoid 4K for faster processing.
    </div>

    <div class="footer-note">TimeSlice by @Darfdits - Universal Edition v2.2</div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        const ffmpeg = createFFmpeg({ 
            log: true, 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js' 
        });

        const inputSlices = document.getElementById('slices');
        inputSlices.oninput = (e) => {
            document.getElementById('val-slices').innerText = e.target.value;
        };

        document.getElementById('btn').onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Please select a video file!");

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const prog = document.getElementById('progress');
            const video = document.getElementById('outputVideo');

            try {
                btn.disabled = true;
                video.style.display = "none";
                status.innerText = "Loading engine...";

                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                status.innerText = "Preparing video...";
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    prog.style.display = 'block';
                    prog.value = ratio * 100;
                    status.innerText = `Processing: ${(ratio * 100).toFixed(0)}%`;
                });

                const n = parseInt(document.getElementById('slices').value);
                const d = parseFloat(document.getElementById('delay').value);
                const isHoriz = document.getElementById('mode').value === 'horizontal';
                const isInv = document.getElementById('flow').value === 'inverted';

                // Optimized Filter Logic
                let filter = `split=${n}`;
                let lbls = ""; for(let i=0; i<n; i++) lbls += `[v${i}]`;
                filter += `${lbls};`;
                let stack = "";
                for(let i=0; i<n; i++) {
                    let idx = isInv ? (n - 1 - i) : i;
                    let time = (idx * d).toFixed(2);
                    let crop = isHoriz ? `iw/${n}:ih:iw/${n}*${i}:0` : `iw:ih/${n}:0:ih/${n}*${i}`;
                    filter += `[v${i}]crop=${crop},trim=start=${time},setpts=PTS-STARTPTS[s${i}];`;
                    stack += `[s${i}]`;
                }
                filter += `${stack}${isHoriz?'hstack':'vstack'}=inputs=${n}:shortest=1`;

                await ffmpeg.run(
                    '-i', 'in.mp4', 
                    '-vf', filter, 
                    '-c:v', 'libx264', 
                    '-preset', 'ultrafast', 
                    '-pix_fmt', 'yuv420p', 
                    '-threads', '1', 
                    'out.mp4'
                );

                const data = ffmpeg.FS('readFile', 'out.mp4');
                video.src = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                video.style.display = "block";
                status.innerText = "Success!";
                
                ffmpeg.FS('unlink', 'in.mp4');
                ffmpeg.FS('unlink', 'out.mp4');
            } catch (e) {
                console.error(e);
                status.innerText = "Error: Try a shorter video.";
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
