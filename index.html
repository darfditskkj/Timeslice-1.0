<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice by @Darfdits</title>
    
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff; --primary: #0a84ff;
            --success: #32d74b; --border: #3a3a3c;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }
        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }
        h1 { font-size: 1.2rem; text-align: center; color: var(--primary); margin: 0 0 20px 0; font-weight: 800; }
        .control-group { margin-bottom: 20px; }
        label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #8e8e93; margin-bottom: 8px; }
        input[type="range"] { width: 100%; height: 6px; background: var(--border); border-radius: 5px; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: #fff; border-radius: 50%; }
        input[type="file"], select, input[type="number"] {
            width: 100%; padding: 12px; background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 1rem;
        }
        button {
            width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }
        button:disabled { background: #3a3a3c; color: #8e8e93; }
        #status { text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--success); font-weight: bold; min-height: 1.5em; }
        progress { width: 100%; height: 8px; margin-top: 10px; accent-color: var(--primary); display: none; }
        video { width: 100%; margin-top: 20px; border-radius: 15px; display: none; }
        .warning { font-size: 0.7rem; color: #ff453a; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TimeSlice by @Darfdits</h1>
        
        <div class="control-group">
            <label>1. Select Video</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div class="control-group">
            <label>Number of Slices: <span id="val-slices">10</span></label>
            <input type="range" id="slices" min="2" max="20" value="10">
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
            <div class="control-group">
                <label>Delay (s)</label>
                <input type="number" id="delay" value="0.15" step="0.05">
            </div>
            <div class="control-group">
                <label>Mode</label>
                <select id="mode">
                    <option value="vertical">Vertical</option>
                    <option value="horizontal">Horizontal</option>
                </select>
            </div>
        </div>

        <button id="btn">GENERATE VIDEO</button>
        
        <div id="status">Ready</div>
        <progress id="progress" value="0" max="100"></progress>
        
        <video id="outputVideo" controls playsinline></video>
        <div class="warning">Note: Videos are processed at 400p to prevent crashes on Android/iOS.</div>
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true, 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js' 
        });

        document.getElementById('slices').oninput = (e) => document.getElementById('val-slices').innerText = e.target.value;

        document.getElementById('btn').onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return;

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const prog = document.getElementById('progress');
            const video = document.getElementById('outputVideo');

            try {
                btn.disabled = true;
                video.style.display = "none";
                status.innerText = "Loading engine...";

                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                status.innerText = "Reading video...";
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    prog.style.display = 'block';
                    prog.value = ratio * 100;
                    status.innerText = `Processing: ${(ratio * 100).toFixed(0)}%`;
                });

                const n = parseInt(document.getElementById('slices').value);
                const d = parseFloat(document.getElementById('delay').value);
                const isHoriz = document.getElementById('mode').value === 'horizontal';

                /**
                 * A SOLUÇÃO DEFINITIVA PARA MEMÓRIA:
                 * 1. scale=400:-2 -> Reduz o vídeo para um tamanho minúsculo antes de qualquer coisa.
                 * 2. Usamos o vídeo escalonado [base] para alimentar as fatias.
                 */
                let filter = `scale=w='if(gt(iw,ih),400,-2)':h='if(gt(iw,ih),-2,400)',split=${n}`;
                let labels = ""; for(let i=0; i<n; i++) labels += `[v${i}]`;
                filter += `${labels};`;
                
                let stack = "";
                for(let i=0; i<n; i++) {
                    let time = (i * d).toFixed(2);
                    let crop = isHoriz ? `iw/${n}:ih:iw/${n}*${i}:0` : `iw:ih/${n}:0:ih/${n}*${i}`;
                    filter += `[v${i}]crop=${crop},trim=start=${time},setpts=PTS-STARTPTS[s${i}];`;
                    stack += `[s${i}]`;
                }
                filter += `${stack}${isHoriz ? 'hstack' : 'vstack'}=inputs=${n}:shortest=1`;

                await ffmpeg.run(
                    '-i', 'in.mp4',
                    '-vf', filter,
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-crf', '28',
                    '-pix_fmt', 'yuv420p',
                    '-threads', '1',
                    'out.mp4'
                );

                const data = ffmpeg.FS('readFile', 'out.mp4');
                video.src = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                video.style.display = "block";
                status.innerText = "Success!";

                ffmpeg.FS('unlink', 'in.mp4');
                ffmpeg.FS('unlink', 'out.mp4');
            } catch (e) {
                console.error(e);
                status.innerText = "Error: Video too heavy.";
                alert("Memory full. Please use a shorter video (max 5 seconds).");
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
