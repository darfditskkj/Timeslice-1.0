<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice Engine Pro</title>
    
    <!-- Script de segurança obrigatório para GitHub Pages -->
    <script src="coi-serviceworker.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: #000; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; min-height: 100vh;
        }
        .card {
            background: #1c1c1e; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
        }
        h1 { font-size: 1.6rem; margin-top: 0; color: #0a84ff; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.85rem; color: #8e8e93; margin-bottom: 8px; }
        input[type="file"], input[type="number"] {
            width: 100%; padding: 12px; background: #2c2c2e;
            border: 1px solid #3a3a3c; border-radius: 12px; color: white;
            box-sizing: border-box; font-size: 1rem;
        }
        button {
            width: 100%; padding: 16px; background: #0a84ff;
            border: none; border-radius: 12px; color: white;
            font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled { background: #3a3a3c; color: #8e8e93; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #32d74b; }
        progress { width: 100%; height: 8px; margin-top: 15px; accent-color: #0a84ff; }
        video { width: 100%; margin-top: 20px; border-radius: 12px; display: none; background: #000; }
        .instruction { font-size: 0.8rem; color: #8e8e93; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TimeSlice Engine</h1>
        
        <div class="input-group">
            <label>1. Selecione o Vídeo</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>Fatias (Slices)</label>
                <input type="number" id="slices" value="15" min="2" max="40">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Atraso (seg)</label>
                <input type="number" id="delay" value="0.1" step="0.1">
            </div>
        </div>

        <button id="btn">GERAR VÍDEO</button>
        
        <div id="status">Pronto para começar</div>
        <progress id="progress" value="0" max="100" style="display:none;"></progress>
        
        <video id="outputVideo" controls playsinline></video>
        <p id="instruction" class="instruction">↑ Toque e segure no vídeo para salvar nas Fotos</p>
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
            log: false 
        });

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const outputVideo = document.getElementById('outputVideo');
        const instruction = document.getElementById('instruction');

        // Lógica corrigida para não travar os frames iniciais
        function buildTimeSliceFilter(numSlices, delayStep) {
            let filter = `split=${numSlices}`;
            let labels = "";
            for(let i=0; i<numSlices; i++) labels += `[v${i}]`;
            filter += `${labels};`;

            let stackLabels = "";
            for(let i=0; i<numSlices; i++) {
                let startTrim = (i * delayStep).toFixed(2);
                // Corta a fatia, pula o início (trim) e reseta o tempo (PTS)
                filter += `[v${i}]crop=iw:ih/${numSlices}:0:ih/${numSlices}*${i},trim=start=${startTrim},setpts=PTS-STARTPTS[s${i}];`;
                stackLabels += `[s${i}]`;
            }
            // shortest=1 garante que o vídeo pare quando a última fatia acabar
            filter += `${stackLabels}vstack=inputs=${numSlices}:shortest=1`;
            return filter;
        }

        btn.onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Selecione um vídeo primeiro!");

            const numSlices = document.getElementById('slices').value;
            const delayStep = document.getElementById('delay').value;

            try {
                btn.disabled = true;
                outputVideo.style.display = "none";
                instruction.style.display = "none";
                
                if (!ffmpeg.isLoaded()) {
                    status.innerText = "Iniciando motor gráfico...";
                    await ffmpeg.load();
                }

                status.innerText = "Carregando arquivo...";
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    progress.style.display = 'block';
                    progress.value = ratio * 100;
                    status.innerText = `Processando: ${(ratio * 100).toFixed(0)}%`;
                });

                const filter = buildTimeSliceFilter(numSlices, delayStep);
                
                status.innerText = "Renderizando... (aguarde)";
                // Configuração otimizada para iPhone/Web
                await ffmpeg.run(
                    '-i', 'in.mp4', 
                    '-vf', filter, 
                    '-c:v', 'libx264', 
                    '-preset', 'ultrafast', 
                    '-pix_fmt', 'yuv420p', 
                    'out.mp4'
                );

                const data = ffmpeg.FS('readFile', 'out.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                status.innerText = "Concluído!";
                outputVideo.src = url;
                outputVideo.style.display = "block";
                instruction.style.display = "block";
                
                // Limpa memória do FFmpeg
                ffmpeg.FS('unlink', 'in.mp4');
                ffmpeg.FS('unlink', 'out.mp4');

            } catch (e) {
                status.innerText = "Erro: " + e.message;
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
