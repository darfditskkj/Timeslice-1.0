<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice Engine Pro</title>
    
    <style>
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: #000; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }
        .card {
            background: #1c1c1e; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1 { font-size: 1.5rem; text-align: center; color: #0a84ff; margin: 0 0 20px 0; }
        
        .control-group { margin-bottom: 20px; }
        label { display: flex; justify-content: space-between; font-size: 0.85rem; color: #8e8e93; margin-bottom: 8px; }
        label span { color: #0a84ff; font-weight: bold; }

        input[type="range"] {
            width: 100%; height: 6px; background: #3a3a3c;
            border-radius: 5px; appearance: none; outline: none; margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 22px; height: 22px; 
            background: #fff; border-radius: 50%; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        input[type="file"], select, input[type="number"] {
            width: 100%; padding: 12px; background: #2c2c2e;
            border: 1px solid #3a3a3c; border-radius: 12px; color: white;
            box-sizing: border-box; font-size: 1rem;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button {
            width: 100%; padding: 18px; background: #0a84ff;
            border: none; border-radius: 12px; color: white;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            margin-top: 10px; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #3a3a3c; color: #8e8e93; }

        #status { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #32d74b; min-height: 1.5em; }
        progress { width: 100%; height: 8px; margin-top: 10px; accent-color: #0a84ff; border-radius: 10px; }
        video { width: 100%; margin-top: 20px; border-radius: 15px; display: none; background: #000; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TimeSlice Engine</h1>
        
        <div class="control-group">
            <label>1. Vídeo de Origem</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div class="control-group">
            <label>Quantidade de Fatias: <span id="val-slices">12</span></label>
            <input type="range" id="slices" min="2" max="40" value="12">
        </div>

        <div class="grid">
            <div class="control-group">
                <label>Atraso (seg)</label>
                <input type="number" id="delay" value="0.10" step="0.05">
            </div>
            <div class="control-group">
                <label>Ângulo</label>
                <select id="mode">
                    <option value="vertical">Vertical (Cima/Baixo)</option>
                    <option value="horizontal">Horizontal (Lados)</option>
                </select>
            </div>
        </div>

        <button id="btn">INICIAR RENDER</button>
        
        <div id="status">Pronto</div>
        <progress id="progress" value="0" max="100" style="display:none;"></progress>
        
        <video id="outputVideo" controls playsinline></video>
    </div>

    <!-- Bibliotecas estáveis para rodar no navegador sem erro -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        // Usando a versão 0.10.0 que é a mais compatível com GitHub Pages/iOS
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js'
        });

        const inputSlices = document.getElementById('slices');
        const valSlices = document.getElementById('val-slices');
        inputSlices.oninput = () => valSlices.innerText = inputSlices.value;

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const outputVideo = document.getElementById('outputVideo');

        // Função de montagem do filtro (Lógica de Fatias Puras)
        function buildTimeSliceFilter(numSlices, delayStep, isHorizontal) {
            let filter = `split=${numSlices}`;
            let labels = "";
            for(let i=0; i<numSlices; i++) labels += `[v${i}]`;
            filter += `${labels};`;

            let stackLabels = "";
            for(let i=0; i<numSlices; i++) {
                let d = (i * delayStep).toFixed(2);
                let cropX = isHorizontal ? `(iw/${numSlices})*${i}` : "0";
                let cropY = isHorizontal ? "0" : `(ih/${numSlices})*${i}`;
                let cropW = isHorizontal ? `iw/${numSlices}` : "iw";
                let cropH = isHorizontal ? "ih" : `ih/${numSlices}`;

                // Recorta cada parte e aplica o atraso de tempo (trim)
                filter += `[v${i}]crop=${cropW}:${cropH}:${cropX}:${cropY},trim=start=${d},setpts=PTS-STARTPTS[s${i}];`;
                stackLabels += `[s${i}]`;
            }
            
            // Empilha as fatias
            const stackMode = isHorizontal ? 'hstack' : 'vstack';
            filter += `${stackLabels}${stackMode}=inputs=${numSlices}:shortest=1`;
            return filter;
        }

        btn.onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Selecione um vídeo!");

            try {
                btn.disabled = true;
                outputVideo.style.display = "none";
                status.innerText = "Carregando motor gráfico...";
                
                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                status.innerText = "Preparando vídeo...";
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    progress.style.display = 'block';
                    progress.value = ratio * 100;
                    status.innerText = `Processando: ${(ratio * 100).toFixed(0)}%`;
                });

                const numSlices = parseInt(inputSlices.value);
                const delayStep = parseFloat(document.getElementById('delay').value);
                const isHorizontal = document.getElementById('mode').value === 'horizontal';

                const filter = buildTimeSliceFilter(numSlices, delayStep, isHorizontal);
                
                status.innerText = "Renderizando fatias...";
                
                // Comando otimizado para iOS e navegadores
                await ffmpeg.run(
                    '-i', 'in.mp4', 
                    '-vf', filter, 
                    '-c:v', 'libx264', 
                    '-preset', 'ultrafast', 
                    '-pix_fmt', 'yuv420p',
                    '-threads', '1',
                    'out.mp4'
                );

                const data = ffmpeg.FS('readFile', 'out.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                status.innerText = "Finalizado!";
                outputVideo.src = url;
                outputVideo.style.display = "block";

                // Limpeza de memória
                ffmpeg.FS('unlink', 'in.mp4');
                ffmpeg.FS('unlink', 'out.mp4');

            } catch (e) {
                status.innerText = "Erro: Tente um vídeo mais curto.";
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
