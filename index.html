<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice Engine Pro</title>
    
    <style>
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: #000; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; min-height: 100vh;
        }
        .card {
            background: #1c1c1e; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
        }
        h1 { font-size: 1.6rem; margin-top: 0; color: #0a84ff; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.85rem; color: #8e8e93; margin-bottom: 8px; }
        
        input[type="file"], input[type="number"], select {
            width: 100%; padding: 12px; background: #2c2c2e;
            border: 1px solid #3a3a3c; border-radius: 12px; color: white;
            box-sizing: border-box; font-size: 1rem;
        }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        button {
            width: 100%; padding: 18px; background: #0a84ff;
            border: none; border-radius: 12px; color: white;
            font-weight: 600; font-size: 1.1rem; cursor: pointer;
            margin-top: 10px; transition: 0.2s;
        }
        button:disabled { background: #3a3a3c; color: #8e8e93; }

        #status { margin-top: 15px; font-size: 0.9rem; color: #32d74b; min-height: 1.2em; }
        progress { width: 100%; height: 10px; margin-top: 15px; accent-color: #0a84ff; }
        video { width: 100%; margin-top: 20px; border-radius: 12px; display: none; background: #000; }
        
        .hint { font-size: 0.75rem; color: #636366; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TimeSlice Engine</h1>
        
        <div class="input-group">
            <label>1. Selecione o Vídeo</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div class="grid-inputs">
            <div class="input-group">
                <label>Ângulo/Direção</label>
                <select id="mode">
                    <option value="vertical">Cima para Baixo</option>
                    <option value="horizontal">Esquerda para Direita</option>
                </select>
            </div>
            <div class="input-group">
                <label>Fatias (Slices)</label>
                <input type="number" id="slices" value="12" min="2" max="30">
            </div>
        </div>

        <div class="grid-inputs">
            <div class="input-group">
                <label>Atraso p/ fatia (s)</label>
                <input type="number" id="delay" value="0.15" step="0.05">
            </div>
            <div class="input-group">
                <label>Fluxo</label>
                <select id="flow">
                    <option value="normal">Normal</option>
                    <option value="inverted">Invertido</option>
                </select>
            </div>
        </div>

        <button id="btn">GERAR EFEITO</button>
        
        <div id="status">Aguardando...</div>
        <progress id="progress" value="0" max="100" style="display:none;"></progress>
        
        <video id="outputVideo" controls playsinline></video>
        <p id="saveHint" class="hint" style="display:none;">Toque e segure no vídeo para salvar nas fotos.</p>
    </div>

    <!-- Versão estável Single Thread para iOS/GitHub -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js'
        });

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const outputVideo = document.getElementById('outputVideo');

        function buildTimeSliceFilter(numSlices, delayStep, isHorizontal, isInverted) {
            let filter = `split=${numSlices}`;
            let labels = "";
            for(let i=0; i<numSlices; i++) labels += `[v${i}]`;
            filter += `${labels};`;

            let stackLabels = "";
            for(let i=0; i<numSlices; i++) {
                // Cálculo do atraso
                let currentIdx = isInverted ? (numSlices - 1 - i) : i;
                let startTrim = (currentIdx * delayStep).toFixed(2);
                
                if (isHorizontal) {
                    // FATIA HORIZONTAL (Corta largura)
                    filter += `[v${i}]crop=iw/${numSlices}:ih:iw/${numSlices}*${i}:0,trim=start=${startTrim},setpts=PTS-STARTPTS[s${i}];`;
                } else {
                    // FATIA VERTICAL (Corta altura)
                    filter += `[v${i}]crop=iw:ih/${numSlices}:0:ih/${numSlices}*${i},trim=start=${startTrim},setpts=PTS-STARTPTS[s${i}];`;
                }
                stackLabels += `[s${i}]`;
            }
            
            const stackMode = isHorizontal ? 'hstack' : 'vstack';
            filter += `${stackLabels}${stackMode}=inputs=${numSlices}:shortest=1`;
            return filter;
        }

        btn.onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Por favor, selecione um vídeo!");

            try {
                btn.disabled = true;
                outputVideo.style.display = "none";
                document.getElementById('saveHint').style.display = "none";
                
                if (!ffmpeg.isLoaded()) {
                    status.innerText = "Carregando motor gráfico...";
                    await ffmpeg.load();
                }

                status.innerText = "Processando arquivo...";
                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    progress.style.display = 'block';
                    progress.value = ratio * 100;
                    status.innerText = `Renderizando: ${(ratio * 100).toFixed(0)}%`;
                });

                const numSlices = parseInt(document.getElementById('slices').value);
                const delayStep = parseFloat(document.getElementById('delay').value);
                const isHorizontal = document.getElementById('mode').value === 'horizontal';
                const isInverted = document.getElementById('flow').value === 'inverted';

                const filter = buildTimeSliceFilter(numSlices, delayStep, isHorizontal, isInverted);
                
                status.innerText = "Gerando fatias temporais...";
                
                await ffmpeg.run(
                    '-i', 'input.mp4', 
                    '-vf', filter, 
                    '-c:v', 'libx264', 
                    '-preset', 'ultrafast', 
                    '-pix_fmt', 'yuv420p',
                    '-threads', '1',
                    'output.mp4'
                );

                const data = ffmpeg.FS('readFile', 'output.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                status.innerText = "Concluído!";
                outputVideo.src = url;
                outputVideo.style.display = "block";
                document.getElementById('saveHint').style.display = "block";

                ffmpeg.FS('unlink', 'input.mp4');
                ffmpeg.FS('unlink', 'output.mp4');

            } catch (e) {
                status.innerText = "Ocorreu um erro no processamento.";
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
