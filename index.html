<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice by @Darfdits</title>
    
    <!-- Multi-thread support for GitHub Pages -->
    <script src="coi-serviceworker.js"></script>
    
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff; --primary: #0a84ff;
            --danger: #ff3b30; --border: #3a3a3c;
        }

        /* Fullscreen Popup Overlay */
        #popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        .popup-content {
            background: var(--card); padding: 30px; border-radius: 20px;
            border: 1px solid var(--danger); max-width: 400px;
        }
        .popup-content p { font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px; }
        .popup-btn {
            background: var(--danger); color: white; border: none;
            padding: 15px 30px; border-radius: 12px; font-weight: bold;
            font-size: 1rem; cursor: pointer; text-transform: uppercase;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }
        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 420px; border: 1px solid var(--border);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin: 0 0 5px 0; font-weight: 900; }
        .badge { font-size: 0.6rem; background: var(--primary); color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        
        .control-group { margin-bottom: 20px; }
        label { display: flex; justify-content: space-between; font-size: 0.85rem; color: #8e8e93; margin-bottom: 8px; }
        
        input[type="file"], select, input[type="number"] {
            width: 100%; padding: 12px; background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; color: white; outline: none;
        }
        input[type="range"] { width: 100%; accent-color: var(--primary); margin: 10px 0; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button#render-btn {
            width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }
        button#render-btn:disabled { background: #3a3a3c; color: #8e8e93; }

        #status { text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--danger); font-weight: bold; }
        progress { width: 100%; height: 8px; margin-top: 10px; accent-color: var(--primary); display: none; }
        video { width: 100%; margin-top: 20px; border-radius: 15px; display: none; background: #000; }
        
        .info-box {
            margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05);
            border-radius: 15px; font-size: 0.75rem; color: #ff3b30; width: 100%; max-width: 420px; box-sizing: border-box;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }
    </style>
</head>
<body>

    <!-- Blocking Popup -->
    <div id="popup-overlay">
        <div class="popup-content">
            <p>Use esse site somente em navegadores com base chromium para o render funcionar 100%</p>
            <button class="popup-btn" onclick="closePopup()">Quero continuar</button>
        </div>
    </div>

    <div class="card">
        <center>
            <h1>TimeSlice Pro</h1>
            <div class="badge">CHROMIUM OPTIMIZED</div>
        </center>
        
        <div class="control-group">
            <label>1. Source Video</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div class="control-group">
            <label>Slices (Limit 30): <span id="val-slices">12</span></label>
            <input type="range" id="slices" min="2" max="30" value="12">
        </div>

        <div class="grid">
            <div class="control-group">
                <label>Delay (s)</label>
                <input type="number" id="delay" value="0.05" step="0.01">
            </div>
            <div class="control-group">
                <label>Direction</label>
                <select id="mode">
                    <option value="vertical">Vertical</option>
                    <option value="horizontal">Horizontal</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <label>Time Flow</label>
            <select id="flow">
                <option value="normal">Normal</option>
                <option value="inverted">Inverted</option>
            </select>
        </div>

        <button id="render-btn">FORCE FULL RENDER</button>
        
        <div id="status">Ready</div>
        <progress id="progress" value="0" max="100"></progress>
        
        <video id="outputVideo" controls playsinline></video>
    </div>

    <div class="info-box">
        <b>Warning:</b> Using more than <b>15 slices</b> may cause rendering failure or broken files on mobile browsers.
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <script>
        // Popup closer
        function closePopup() {
            document.getElementById('popup-overlay').style.display = 'none';
        }

        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
        });

        document.getElementById('slices').oninput = (e) => document.getElementById('val-slices').innerText = e.target.value;

        document.getElementById('render-btn').onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return;

            const btn = document.getElementById('render-btn');
            const status = document.getElementById('status');
            const prog = document.getElementById('progress');
            const video = document.getElementById('outputVideo');

            try {
                btn.disabled = true;
                video.style.display = "none";
                
                if (!ffmpeg.isLoaded()) {
                    status.innerText = "Loading Engine...";
                    await ffmpeg.load();
                }

                status.innerText = "Reading File...";
                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    prog.style.display = 'block';
                    prog.value = ratio * 100;
                    status.innerText = `Rendering: ${(ratio * 100).toFixed(0)}%`;
                });

                const n = parseInt(document.getElementById('slices').value);
                const d = parseFloat(document.getElementById('delay').value);
                const isHoriz = document.getElementById('mode').value === 'horizontal';
                const isInv = document.getElementById('flow').value === 'inverted';

                // FILTER IMPROVEMENTS FOR EDGE/MOBILE:
                // 1. floor() helps avoiding sub-pixel dimension issues.
                // 2. scale=trunc(iw/2)*2:trunc(ih/2)*2 ensures even dimensions for H.264.
                let filter = `split=${n}`;
                let labels = ""; for(let i=0; i<n; i++) labels += `[v${i}]`;
                filter += `${labels};`;
                
                let stack = "";
                for(let i=0; i<n; i++) {
                    let currentIdx = isInv ? (n - 1 - i) : i;
                    let time = (currentIdx * d).toFixed(2);
                    
                    let crop = isHoriz ? 
                        `floor(iw/${n}):ih:floor(iw/${n}*${i}):0` : 
                        `iw:floor(ih/${n}):0:floor(ih/${n}*${i})`;
                        
                    filter += `[v${i}]crop=${crop},trim=start=${time},setpts=PTS-STARTPTS[s${i}];`;
                    stack += `[s${i}]`;
                }
                const stackMode = isHoriz ? 'hstack' : 'vstack';
                filter += `${stack}${stackMode}=inputs=${n}:shortest=1,scale=trunc(iw/2)*2:trunc(ih/2)*2`;

                await ffmpeg.run(
                    '-i', 'input.mp4',
                    '-vf', filter,
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-profile:v', 'baseline', // Max compatibility for mobile decoders
                    '-level', '3.0',           // Standard level for web
                    '-pix_fmt', 'yuv420p',
                    '-threads', '0',
                    'output.mp4'
                );

                const data = ffmpeg.FS('readFile', 'output.mp4');
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                video.src = URL.createObjectURL(blob);
                video.style.display = "block";
                status.innerText = "Done!";

                ffmpeg.FS('unlink', 'input.mp4');
                ffmpeg.FS('unlink', 'output.mp4');

            } catch (e) {
                console.error(e);
                status.innerText = "Rendering Error.";
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
