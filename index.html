<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice Engine (Versão Estável)</title>
    
    <style>
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: #121212; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; min-height: 100vh;
        }
        .card {
            background: #1e1e1e; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-top: 0; color: #007aff; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 8px; }
        input[type="file"], input[type="number"] {
            width: 100%; padding: 12px; background: #2d2d2d;
            border: 1px solid #444; border-radius: 10px; color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 16px; background: #007aff;
            border: none; border-radius: 10px; color: white;
            font-weight: 600; cursor: pointer;
        }
        button:disabled { background: #444; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #00ff88; }
        progress { width: 100%; height: 8px; margin-top: 15px; }
        video { width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TimeSlice Engine</h1>
        
        <div class="input-group">
            <label>Vídeo Original</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group">
                <label>Fatias</label>
                <input type="number" id="slices" value="10" min="2" max="20">
            </div>
            <div class="input-group">
                <label>Atraso (s)</label>
                <input type="number" id="delay" value="0.2" step="0.1">
            </div>
        </div>

        <button id="btn">GERAR EFEITO</button>
        
        <div id="status">Aguardando arquivo...</div>
        <progress id="progress" value="0" max="100" style="display:none;"></progress>
        
        <video id="outputVideo" controls playsinline></video>
    </div>

    <!-- USANDO VERSÃO 0.10.1 (Mais compatível com GitHub Pages/iOS) -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        // Esta configuração evita o erro de SharedArrayBuffer
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js'
        });

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const outputVideo = document.getElementById('outputVideo');

        function buildFilter(numSlices, delayStep) {
            let filter = `split=${numSlices}`;
            let labels = "";
            for(let i=0; i<numSlices; i++) labels += `[v${i}]`;
            filter += `${labels};`;

            let stackLabels = "";
            for(let i=0; i<numSlices; i++) {
                let d = (i * delayStep).toFixed(2);
                filter += `[v${i}]crop=iw:ih/${numSlices}:0:ih/${numSlices}*${i},trim=start=${d},setpts=PTS-STARTPTS[s${i}];`;
                stackLabels += `[s${i}]`;
            }
            filter += `${stackLabels}vstack=inputs=${numSlices}:shortest=1`;
            return filter;
        }

        btn.onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Selecione um vídeo!");

            try {
                btn.disabled = true;
                status.innerText = "Carregando motor (aguarde)...";
                
                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                status.innerText = "Preparando vídeo...";
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    progress.style.display = 'block';
                    progress.value = ratio * 100;
                    status.innerText = `Processando: ${(ratio * 100).toFixed(0)}%`;
                });

                const numSlices = document.getElementById('slices').value;
                const delayStep = document.getElementById('delay').value;
                const filter = buildFilter(numSlices, delayStep);
                
                status.innerText = "Renderizando... (pode demorar)";
                
                // Comando otimizado para não travar
                await ffmpeg.run(
                    '-i', 'in.mp4', 
                    '-vf', filter, 
                    '-c:v', 'libx264', 
                    '-preset', 'ultrafast', 
                    '-pix_fmt', 'yuv420p',
                    '-threads', '1', // Força usar apenas 1 thread (resolve o erro)
                    'out.mp4'
                );

                const data = ffmpeg.FS('readFile', 'out.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                status.innerText = "Sucesso!";
                outputVideo.src = url;
                outputVideo.style.display = "block";
                
                // Limpa arquivos da memória
                ffmpeg.FS('unlink', 'in.mp4');
                ffmpeg.FS('unlink', 'out.mp4');

            } catch (e) {
                status.innerText = "Erro de Memória ou Formato. Tente um vídeo menor.";
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
