<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice by @Darfdits</title>
    
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --text-sec: #8e8e93;
            --primary: #0a84ff; --success: #32d74b; --border: #3a3a3c; --input: #2c2c2e;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }
        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            box-sizing: border-box; margin-top: 10px;
        }
        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin: 0 0 20px 0; font-weight: 800; }
        .control-group { margin-bottom: 20px; }
        label { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-sec); margin-bottom: 8px; }
        label span { color: var(--primary); font-weight: bold; }
        input[type="range"] { width: 100%; height: 6px; background: var(--border); border-radius: 5px; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: #fff; border-radius: 50%; }
        input[type="file"], select, input[type="number"] {
            width: 100%; padding: 12px; background: var(--input); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1rem;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button#btn {
            width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px;
        }
        button#btn:disabled { background: var(--border); color: var(--text-sec); }
        #status { text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--success); font-weight: bold; }
        progress { width: 100%; height: 8px; margin-top: 10px; accent-color: var(--primary); display: none; }
        video { width: 100%; margin-top: 20px; border-radius: 15px; display: none; background: #000; }
        .requirements { margin-top: 20px; padding: 20px; background: var(--card); border-radius: 20px; width: 100%; max-width: 420px; font-size: 0.75rem; color: var(--text-sec); box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TimeSlice by @Darfdits</h1>
        
        <div class="control-group">
            <label>1. Select Video Source</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div class="control-group">
            <label>Processing Quality</label>
            <select id="quality">
                <option value="480">480p (Best for Android)</option>
                <option value="720" selected>720p (High Definition)</option>
                <option value="1080">1080p (Heavy - May Fail)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Number of Slices: <span id="val-slices">12</span></label>
            <input type="range" id="slices" min="2" max="30" value="12">
        </div>

        <div class="grid">
            <div class="control-group">
                <label>Delay (sec)</label>
                <input type="number" id="delay" value="0.10" step="0.05">
            </div>
            <div class="control-group">
                <label>Angle</label>
                <select id="mode">
                    <option value="vertical">Vertical</option>
                    <option value="horizontal">Horizontal</option>
                </select>
            </div>
        </div>

        <button id="btn">START RENDERING</button>
        
        <div id="status">Ready</div>
        <progress id="progress" value="0" max="100"></progress>
        
        <video id="outputVideo" controls playsinline></video>
    </div>

    <div class="requirements">
        <b>Android Fix:</b> If it fails, select <b>480p</b>. This reduces memory usage and prevents the browser from crashing.
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true, 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js' 
        });

        document.getElementById('slices').oninput = (e) => document.getElementById('val-slices').innerText = e.target.value;

        document.getElementById('btn').onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Select a video!");

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const prog = document.getElementById('progress');
            const video = document.getElementById('outputVideo');

            try {
                btn.disabled = true;
                video.style.display = "none";
                status.innerText = "Initializing...";

                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                status.innerText = "Uploading...";
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    prog.style.display = 'block';
                    prog.value = ratio * 100;
                    status.innerText = `Processing: ${(ratio * 100).toFixed(0)}%`;
                });

                const n = parseInt(document.getElementById('slices').value);
                const d = parseFloat(document.getElementById('delay').value);
                const quality = document.getElementById('quality').value;
                const isHoriz = document.getElementById('mode').value === 'horizontal';

                // THE FIX: scale the video at the beginning to save memory
                let filter = `scale=-1:${quality},split=${n}`;
                let lbls = ""; for(let i=0; i<n; i++) lbls += `[v${i}]`;
                filter += `${lbls};`;
                let stack = "";
                for(let i=0; i<n; i++) {
                    let time = (i * d).toFixed(2);
                    let crop = isHoriz ? `iw/${n}:ih:iw/${n}*${i}:0` : `iw:ih/${n}:0:ih/${n}*${i}`;
                    filter += `[v${i}]crop=${crop},trim=start=${time},setpts=PTS-STARTPTS[s${i}];`;
                    stack += `[s${i}]`;
                }
                filter += `${stack}${isHoriz?'hstack':'vstack'}=inputs=${n}:shortest=1`;

                await ffmpeg.run('-i', 'in.mp4', '-vf', filter, '-c:v', 'libx264', '-preset', 'ultrafast', '-pix_fmt', 'yuv420p', '-threads', '1', 'out.mp4');

                const data = ffmpeg.FS('readFile', 'out.mp4');
                video.src = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                video.style.display = "block";
                status.innerText = "Done!";

                ffmpeg.FS('unlink', 'in.mp4');
                ffmpeg.FS('unlink', 'out.mp4');
            } catch (e) {
                console.error(e);
                status.innerText = "Memory Error. Try 480p Quality.";
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
