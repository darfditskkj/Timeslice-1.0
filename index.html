
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSlice by @Darfdits</title>
    
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff; --text-sec: #8e8e93;
            --primary: #0a84ff; --success: #32d74b; --border: #3a3a3c; --input: #2c2c2e;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }
        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }
        h1 { font-size: 1.2rem; text-align: center; color: var(--primary); margin: 0 0 20px 0; font-weight: 800; }
        .control-group { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-sec); margin-bottom: 5px; }
        input[type="range"] { width: 100%; height: 6px; background: var(--border); border-radius: 5px; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: #fff; border-radius: 50%; }
        input[type="file"], select, input[type="number"] {
            width: 100%; padding: 10px; background: var(--input); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button#btn {
            width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button#btn:disabled { background: var(--border); color: var(--text-sec); }
        #status { text-align: center; margin-top: 15px; font-size: 0.85rem; color: var(--success); font-weight: bold; }
        progress { width: 100%; height: 6px; margin-top: 10px; accent-color: var(--primary); display: none; }
        video { width: 100%; margin-top: 15px; border-radius: 12px; display: none; background: #000; }
        .footer { font-size: 0.7rem; color: #444; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TimeSlice by @Darfdits</h1>
        
        <div class="control-group">
            <label>1. Select Video</label>
            <input type="file" id="uploader" accept="video/*" />
        </div>

        <div class="grid">
            <div class="control-group">
                <label>Slices: <span id="val-slices">8</span></label>
                <input type="range" id="slices" min="2" max="20" value="8">
            </div>
            <div class="control-group">
                <label>Delay (s)</label>
                <input type="number" id="delay" value="0.15" step="0.05" style="padding: 8px;">
            </div>
        </div>

        <div class="control-group">
            <label>Resolution (Android Fix)</label>
            <select id="quality">
                <option value="360">360p (Ultra Fast / Low RAM)</option>
                <option value="480" selected>480p (Standard Android)</option>
                <option value="720">720p (HD - High RAM)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Direction</label>
            <select id="mode">
                <option value="vertical">Vertical</option>
                <option value="horizontal">Horizontal</option>
            </select>
        </div>

        <button id="btn">RENDER VIDEO</button>
        
        <div id="status">Ready</div>
        <progress id="progress" value="0" max="100"></progress>
        
        <video id="outputVideo" controls playsinline></video>
    </div>

    <div class="footer">
        v2.3 stable | Recommended: 3s video at 480p
    </div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true, 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js' 
        });

        document.getElementById('slices').oninput = (e) => document.getElementById('val-slices').innerText = e.target.value;

        document.getElementById('btn').onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Select video!");

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const prog = document.getElementById('progress');
            const video = document.getElementById('outputVideo');

            try {
                btn.disabled = true;
                video.style.display = "none";
                status.innerText = "Initializing Engine...";

                if (!ffmpeg.isLoaded()) await ffmpeg.load();

                status.innerText = "Reading file...";
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));

                ffmpeg.setProgress(({ ratio }) => {
                    prog.style.display = 'block';
                    prog.value = ratio * 100;
                    status.innerText = `Rendering: ${(ratio * 100).toFixed(0)}%`;
                });

                const n = parseInt(document.getElementById('slices').value);
                const d = parseFloat(document.getElementById('delay').value);
                const q = document.getElementById('quality').value;
                const isHoriz = document.getElementById('mode').value === 'horizontal';

                // LÓGICA DE FILTRO OTIMIZADA PARA BAIXO CONSUMO DE RAM
                // 1. Redimensionamos primeiro (muito importante para Android)
                // 2. Usamos uma técnica de fatiamento direto sem 'split' massivo
                let filter = `scale=-2:${q},`; 
                let parts = "";
                for(let i=0; i<n; i++) {
                    let time = (i * d).toFixed(2);
                    let crop = isHoriz ? `iw/${n}:ih:iw/${n}*${i}:0` : `iw:ih/${n}:0:ih/${n}*${i}`;
                    // Criamos cada fatia como uma stream temporária e já liberamos da memória assim que possível
                    parts += `[0:v]crop=${crop},trim=start=${time},setpts=PTS-STARTPTS[s${i}];`;
                }
                filter = parts + "";
                let stack = ""; for(let i=0; i<n; i++) stack += `[s${i}]`;
                filter += `${stack}${isHoriz ? 'hstack' : 'vstack'}=inputs=${n}:shortest=1`;

                await ffmpeg.run(
                    '-i', 'in.mp4',
                    '-filter_complex', filter,
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-tune', 'zerolatency',
                    '-pix_fmt', 'yuv420p',
                    '-threads', '1',
                    'out.mp4'
                );

                const data = ffmpeg.FS('readFile', 'out.mp4');
                video.src = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                video.style.display = "block";
                status.innerText = "Done!";

                ffmpeg.FS('unlink', 'in.mp4');
                ffmpeg.FS('unlink', 'out.mp4');
            } catch (e) {
                console.error(e);
                status.innerText = "Error: Use 360p or a shorter video.";
                alert("The browser ran out of memory. Try 360p Quality and fewer slices.");
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
