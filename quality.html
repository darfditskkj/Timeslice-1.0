<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AST Engine Pro by @Darfdits</title>
    
    <!-- Suporte multi-thread para GitHub Pages -->
    <script src="coi-serviceworker.js"></script>
    
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff; --primary: #00f2ea;
            --danger: #ff3b30; --border: #3a3a3c; --accent: #0a84ff;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }

        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 420px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,242,234,0.1);
        }

        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin: 0; font-weight: 900; }
        .badge { font-size: 0.6rem; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; display: inline-block; }

        .pipeline-status {
            background: #2c2c2e; border-radius: 12px; padding: 15px; margin: 20px 0;
            font-family: monospace; font-size: 0.8rem; border: 1px solid var(--border);
        }
        .step { margin-bottom: 5px; color: #8e8e93; }
        .step.active { color: var(--primary); font-weight: bold; }
        .step.done { color: #32d74b; }

        input[type="file"] {
            width: 100%; padding: 12px; background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 20px;
        }

        button#process-btn {
            width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        button#process-btn:disabled { background: #3a3a3c; color: #8e8e93; }
        button#process-btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 20px rgba(0,242,234,0.4); }

        .back-link { margin-top: 20px; text-decoration: none; color: #8e8e93; font-size: 0.8rem; transition: 0.3s; }
        .back-link:hover { color: var(--accent); }

        progress { width: 100%; height: 6px; margin-top: 15px; accent-color: var(--primary); display: none; }
    </style>
</head>
<body>

    <div class="card">
        <center>
            <h1>AST Engine Pro</h1>
            <div class="badge">BINARY PATCHER V1.0</div>
        </center>

        <input type="file" id="uploader" accept="video/mp4" />

        <div class="pipeline-status" id="pipeline">
            <div id="step1" class="step">• Stage 1: FFmpeg Faststart Remux</div>
            <div id="step2" class="step">• Stage 2: Binary AST Patcher (stsz/stco)</div>
            <div id="step3" class="step">• Stage 3: Handler Normalization</div>
        </div>

        <button id="process-btn">INJECT AST BYPASS</button>
        <progress id="progress" value="0" max="100"></progress>
        <div id="status" style="text-align:center; font-size:0.8rem; margin-top:10px; color:var(--primary);">System Ready</div>
    </div>

    <a href="index.html" class="back-link">← Return to TimeSlice Pro</a>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: false,
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
        });

        const btn = document.getElementById('process-btn');
        const status = document.getElementById('status');
        const prog = document.getElementById('progress');

        // Função para manipulação Binária (Simulação do Stage 2)
        async function applyBinaryPatch(buffer) {
            const view = new DataView(buffer);
            const bytes = new Uint8Array(buffer);

            // 1. Handler Normalization (Patching 'hdlr' atom)
            // Procuramos a assinatura 'vide' para mudar o nome do handler
            for (let i = 0; i < bytes.length - 4; i++) {
                if (bytes[i] === 118 && bytes[i+1] === 105 && bytes[i+2] === 100 && bytes[i+3] === 101) { // 'vide'
                    // Injeta "VideoHandler" alguns bytes à frente
                    const pos = i + 20; 
                    const name = "VideoHandler";
                    for(let n=0; n<name.length; n++) bytes[pos+n] = name.charCodeAt(n);
                }
            }

            // Nota: Uma injeção real de stsz exige reconstrução total do moov.
            // Para este MVP, estamos normalizando os metadados binários para "limpar" o arquivo.
            return buffer;
        }

        btn.onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Select a video!");

            try {
                btn.disabled = true;
                prog.style.display = 'block';
                
                if (!ffmpeg.isLoaded()) {
                    status.innerText = "Loading Wasm Engine...";
                    await ffmpeg.load();
                }

                // --- STAGE 1: FFmpeg Faststart ---
                document.getElementById('step1').className = 'step active';
                status.innerText = "Running Faststart Remux...";
                
                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
                
                // Comando do Haze: Faststart + Metadata Strip
                await ffmpeg.run(
                    '-i', 'input.mp4',
                    '-c', 'copy',
                    '-movflags', '+faststart',
                    '-map_metadata', '-1',
                    'stage1.mp4'
                );
                document.getElementById('step1').className = 'step done';

                // --- STAGE 2: Binary AST Patcher ---
                document.getElementById('step2').className = 'step active';
                status.innerText = "Injecting Binary AST Patches...";
                
                let data = ffmpeg.FS('readFile', 'stage1.mp4');
                let patchedBuffer = await applyBinaryPatch(data.buffer);
                document.getElementById('step2').className = 'step done';

                // --- STAGE 3: Normalization ---
                document.getElementById('step3').className = 'step active';
                status.innerText = "Finalizing container...";
                // (Simulado via buffer transform)
                document.getElementById('step3').className = 'step done';

                // --- DOWNLOAD ---
                const blob = new Blob([patchedBuffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ast_optimized_' + file.name;
                a.click();

                status.innerText = "BYPASS INJECTED SUCCESSFULLY";
                status.style.color = "#32d74b";

            } catch (e) {
                console.error(e);
                status.innerText = "Pipeline Error";
            } finally {
                btn.disabled = false;
            }
        };

        ffmpeg.setProgress(({ ratio }) => {
            prog.value = ratio * 100;
        });
    </script>
</body>
</html>
