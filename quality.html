<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AST Engine Pro - V2</title>
    
    <!-- Script essencial para rodar o motor WASM no GitHub -->
    <script src="coi-serviceworker.js"></script>
    
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff; --primary: #00f2ea;
            --accent: #0a84ff; --border: #3a3a3c; --success: #32d74b;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }

        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 420px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,242,234,0.1);
        }

        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin: 0; font-weight: 900; }
        .badge { font-size: 0.6rem; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        
        .selector-label { font-size: 0.75rem; color: #8e8e93; margin-bottom: 10px; display: block; text-align: left; }
        
        .methods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        .method-btn {
            background: #2c2c2e; border: 1px solid var(--border); color: white;
            padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .method-btn:hover { border-color: var(--primary); background: #3a3a3c; }
        .method-btn.active { border-color: var(--primary); background: rgba(0, 242, 234, 0.1); box-shadow: inset 0 0 10px rgba(0,242,234,0.2); }
        .method-btn b { font-size: 0.9rem; }
        .method-btn span { font-size: 0.65rem; color: #8e8e93; text-transform: uppercase; }

        input[type="file"] {
            width: 100%; padding: 12px; background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 20px;
        }

        button#process-btn {
            width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        button#process-btn:disabled { background: #3a3a3c; color: #8e8e93; cursor: not-allowed; }
        
        #status-box {
            background: #000; border-radius: 12px; padding: 15px; margin-top: 20px;
            font-family: 'Courier New', monospace; font-size: 0.75rem; border: 1px solid var(--border);
            min-height: 80px; text-align: left; overflow-y: auto; max-height: 150px;
        }
        .log-entry { margin-bottom: 4px; color: var(--primary); }
        .log-entry.success { color: var(--success); }

        progress { width: 100%; height: 6px; margin-top: 10px; accent-color: var(--primary); display: none; }
        .back-link { margin-top: 25px; text-decoration: none; color: #8e8e93; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card">
        <center>
            <h1>AST Engine Pro</h1>
            <div class="badge">ULTRA-FAST OPTIMIZER</div>
        </center>

        <label class="selector-label">Select Optimization Method:</label>
        <div class="methods">
            <div class="method-btn active" id="modeV1" onclick="setMode('V1')">
                <b>METHOD V1</b>
                <span>Stable Remux</span>
            </div>
            <div class="method-btn" id="modeV2" onclick="setMode('V2')">
                <b>METHOD V2</b>
                <span>Max Fidelity</span>
            </div>
        </div>

        <input type="file" id="uploader" accept="video/mp4,video/quicktime" />

        <button id="process-btn">INJECT OPTIMIZATION</button>
        <progress id="progress" value="0" max="100"></progress>
        
        <div id="status-box">
            <div class="log-entry">> System initialized. Ready.</div>
        </div>
    </div>

    <a href="index.html" class="back-link">← Return to TimeSlice Pro</a>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <script>
        let currentMode = 'V1';
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('modeV1').classList.toggle('active', mode === 'V1');
            document.getElementById('modeV2').classList.toggle('active', mode === 'V2');
            addLog(`Switched to ${mode} mode.`);
        }

        function addLog(msg, type = '') {
            const box = document.getElementById('status-box');
            const div = document.createElement('div');
            div.className = 'log-entry ' + type;
            div.innerText = '> ' + msg;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Patch Binário para Normalização de Metadados
        async function applyBinaryNormalization(buffer) {
            const bytes = new Uint8Array(buffer);
            const hdlrSearch = [104, 100, 108, 114]; // 'hdlr'
            for (let i = 0; i < Math.min(bytes.length, 10000); i++) {
                if (bytes[i] === hdlrSearch[0] && bytes[i+1] === hdlrSearch[1]) {
                    const pos = i + 24;
                    const patch = "VideoHandler";
                    for(let j=0; j<patch.length; j++) bytes[pos+j] = patch.charCodeAt(j);
                    break;
                }
            }
            return bytes;
        }

        document.getElementById('process-btn').onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return alert("Please select a video file!");

            const btn = document.getElementById('process-btn');
            const prog = document.getElementById('progress');

            try {
                btn.disabled = true;
                prog.style.display = 'block';

                if (!ffmpeg.isLoaded()) {
                    addLog("Loading WASM Core...");
                    await ffmpeg.load();
                }

                addLog(`Starting ${currentMode} Pipeline...`);
                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

                if (currentMode === 'V1') {
                    // MODO V1: Remux ultra-rápido com limpeza de metadados
                    await ffmpeg.run(
                        '-i', 'input.mp4',
                        '-c', 'copy',
                        '-map_metadata', '-1',
                        '-movflags', '+faststart',
                        'out.mp4'
                    );
                } else {
                    // MODO V2: Re-encode de Ultra-Fidelidade para adaptação de Bitrate
                    addLog("Analyzing stream for High-Fidelity adaptation...");
                    await ffmpeg.run(
                        '-i', 'input.mp4',
                        '-c:v', 'libx264',
                        '-crf', '14', // Qualidade Visual sem perdas
                        '-preset', 'faster',
                        '-pix_fmt', 'yuv420p',
                        '-map_metadata', '-1',
                        '-movflags', '+faststart',
                        'out.mp4'
                    );
                }

                addLog("Applying Binary AST Normalization...");
                const data = ffmpeg.FS('readFile', 'out.mp4');
                const finalData = await applyBinaryNormalization(data.buffer);

                const blob = new Blob([finalData], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `optimized_${currentMode}_${file.name}`;
                a.click();

                addLog("Pipeline Finished Successfully!", "success");
                
                // Limpeza de memória virtual
                ffmpeg.FS('unlink', 'input.mp4');
                ffmpeg.FS('unlink', 'out.mp4');

            } catch (e) {
                addLog("Pipeline Error. Try using Chrome on Desktop.", "error");
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        };

        ffmpeg.setProgress(({ ratio }) => {
            prog.value = ratio * 100;
        });
    </script>
</body>
</html>
