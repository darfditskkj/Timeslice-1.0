<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Quality Engine</title>
    <!-- Script essencial para rodar no GitHub Pages -->
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #151515; border: 1px solid #333; padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { color: #00f2ea; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        .drop-zone { border: 2px dashed #444; padding: 30px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { border-color: #00f2ea; background: #1a1a1a; }
        input[type="file"] { display: none; }
        #btnProcess { background: #00f2ea; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; display: none; }
        #status { margin-top: 20px; font-family: monospace; color: #00f2ea; font-size: 0.8rem; }
        progress { width: 100%; height: 10px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Quality Engine 60</h1>
    <p>Upload your video for max quality bypass</p>
    
    <label class="drop-zone" id="label">
        <span id="fileName">Drop video or click to upload</span>
        <input type="file" id="uploader" accept="video/*">
    </label>

    <button id="btnProcess">START PROCESSING</button>
    
    <progress id="progress" value="0" max="100"></progress>
    <div id="status">Ready</div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    const uploader = document.getElementById('uploader');
    const btnProcess = document.getElementById('btnProcess');
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    const label = document.getElementById('fileName');

    uploader.onchange = (e) => {
        if(e.target.files[0]) {
            label.innerText = e.target.files[0].name;
            btnProcess.style.display = 'block';
        }
    };

    btnProcess.onclick = async () => {
        const file = uploader.files[0];
        btnProcess.disabled = true;
        btnProcess.innerText = "PROCESSING...";
        progress.style.display = 'block';

        if (!ffmpeg.isLoaded()) {
            status.innerText = "Loading Engine...";
            await ffmpeg.load();
        }

        status.innerText = "Injecting Metadata...";
        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

        // Comando otimizado para qualidade e 60fps
        // CRF 18 mantém a fidelidade visual altíssima
        await ffmpeg.run(
            '-i', 'input.mp4',
            '-c:v', 'libx264',
            '-crf', '18',
            '-preset', 'faster',
            '-r', '60',
            '-c:a', 'copy',
            'output.mp4'
        );

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'high_quality_tiktok.mp4';
        a.click();

        status.innerText = "Done! Download started.";
        btnProcess.disabled = false;
        btnProcess.innerText = "START PROCESSING";
    };

    ffmpeg.setProgress(({ ratio }) => {
        progress.value = ratio * 100;
    });
</script>

</body>
</html>
