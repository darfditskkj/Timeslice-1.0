<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AST Engine Pro - Fixed Render</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff; --primary: #00f2ea;
            --danger: #ff3b30; --border: #3a3a3c;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; margin: 0; min-height: 100vh;
        }
        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 420px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,242,234,0.1);
        }
        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); margin: 0; font-weight: 900; }
        .badge { font-size: 0.6rem; background: var(--primary); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        .pipeline-status {
            background: #2c2c2e; border-radius: 12px; padding: 15px; margin: 20px 0;
            font-family: monospace; font-size: 0.8rem; border: 1px solid var(--border);
        }
        .step { margin-bottom: 5px; color: #8e8e93; }
        .step.active { color: var(--primary); font-weight: bold; }
        .step.done { color: #32d74b; }
        input[type="file"] { width: 100%; padding: 12px; background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 20px; }
        button#process-btn {
            width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        button#process-btn:disabled { background: #3a3a3c; color: #8e8e93; }
        progress { width: 100%; height: 6px; margin-top: 15px; accent-color: var(--primary); display: none; }
        .back-btn { margin-top: 20px; color: #8e8e93; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card">
        <center>
            <h1>AST Engine Pro</h1>
            <div class="badge">STABLE BYPASS V3</div>
        </center>

        <input type="file" id="uploader" accept="video/mp4" />

        <div class="pipeline-status">
            <div id="step1" class="step">• Stage 1: Faststart Remux (No Loss)</div>
            <div id="step2" class="step">• Stage 2: Binary AST Patching</div>
            <div id="step3" class="step">• Stage 3: Metadata Optimization</div>
        </div>

        <button id="process-btn">START AST PROCESS</button>
        <progress id="progress" value="0" max="100"></progress>
        <div id="status" style="text-align:center; font-size:0.8rem; margin-top:10px; color:var(--primary);">System Ready</div>
    </div>

    <a href="index.html" class="back-btn">← Back to TimeSlice</a>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        // Função de Patch Binário mais leve (Surgical Patch)
        async function applyBypass(buffer) {
            const bytes = new Uint8Array(buffer);
            const search = [104, 100, 108, 114]; // 'hdlr'
            
            // Patch apenas os primeiros Handlers para não corromper o arquivo
            let patchesDone = 0;
            for (let i = 0; i < bytes.length - 50 && patchesDone < 2; i++) {
                if (bytes[i] === search[0] && bytes[i+1] === search[1] && bytes[i+2] === search[2] && bytes[i+3] === search[3]) {
                    const pos = i + 24; 
                    const patch = "VideoHandler";
                    for(let j=0; j<patch.length; j++) {
                        bytes[pos+j] = patch.charCodeAt(j);
                    }
                    patchesDone++;
                }
            }
            return bytes;
        }

        document.getElementById('process-btn').onclick = async () => {
            const file = document.getElementById('uploader').files[0];
            if (!file) return;

            const btn = document.getElementById('process-btn');
            const status = document.getElementById('status');
            const prog = document.getElementById('progress');

            try {
                btn.disabled = true;
                prog.style.display = 'block';
                
                if (!ffmpeg.isLoaded()) {
                    status.innerText = "Connecting to Engine...";
                    await ffmpeg.load();
                }

                // STAGE 1: Remux Ultra-Rápido (Mantém qualidade 1:1)
                document.getElementById('step1').className = 'step active';
                status.innerText = "Remuxing Container...";
                
                ffmpeg.FS('writeFile', 'in.mp4', await fetchFile(file));
                
                // Comando otimizado para não dar erro de memória e manter thumbnail
                await ffmpeg.run(
                    '-i', 'in.mp4',
                    '-c', 'copy',
                    '-map_metadata', '0', // Mantém metadados básicos para o Windows ver o vídeo
                    '-movflags', '+faststart',
                    'stage1.mp4'
                );
                document.getElementById('step1').className = 'step done';

                // STAGE 2: Patch Binário
                document.getElementById('step2').className = 'step active';
                status.innerText = "Injecting AST...";
                const data = ffmpeg.FS('readFile', 'stage1.mp4');
                const patchedData = await applyBypass(data.buffer);
                document.getElementById('step2').className = 'step done';

                // STAGE 3: Finalização
                document.getElementById('step3').className = 'step active';
                const blob = new Blob([patchedData], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "ast_v3_" + file.name;
                a.click();
                document.getElementById('step3').className = 'step done';

                status.innerText = "SUCCESSFUL BYPASS";
                status.style.color = "#32d74b";

            } catch (e) {
                console.error(e);
                status.innerText = "Render Error: Use Chrome/Edge";
                status.style.color = "var(--danger)";
            } finally {
                btn.disabled = false;
            }
        };

        ffmpeg.setProgress(({ ratio }) => {
            prog.value = ratio * 100;
        });
    </script>
</body>
</html>
